<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#fdf6f0">
  <title>JANnina ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #fdf6f0;
      --rose:      #f2a8b8;
      --rose-soft: #fce8ed;
      --lavender:  #c9b8e8;
      --lav-soft:  #ede8f8;
      --mint:      #a8d5c2;
      --mint-soft: #e2f4ee;
      --peach:     #f5c9a0;
      --text:      #4a3728;
      --text-soft: #9c8276;
      --shadow:    rgba(180,130,110,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans',sans-serif;
      overflow:hidden;
    }

    .blob { position:fixed; border-radius:50%; filter:blur(70px); pointer-events:none; z-index:0; opacity:0.4; }
    .blob-1 { width:300px; height:300px; background:var(--lavender); top:-60px;   right:-60px; animation:drift1 12s ease-in-out infinite; }
    .blob-2 { width:250px; height:250px; background:var(--peach);    bottom:80px; left:-60px;  animation:drift2 15s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,20px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-15px)} }

    /* ── SIDEBAR ── */
    .sidebar-overlay { position:fixed; inset:0; background:rgba(74,55,40,0.2); backdrop-filter:blur(3px); z-index:50; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .sidebar-overlay.open { opacity:1; pointer-events:all; }
    .sidebar { position:fixed; top:0; left:0; bottom:0; width:82%; max-width:320px; background:var(--bg); z-index:51; transform:translateX(-100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; box-shadow:4px 0 24px var(--shadow); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-header { padding:28px 20px 16px; border-bottom:1px solid rgba(180,130,110,0.12); }
    .sidebar-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; }
    .sidebar-title span { color:var(--rose); font-style:italic; }
    .sidebar-sub { font-size:0.72rem; color:var(--text-soft); margin-top:3px; }
    .sidebar-new-btn { margin:14px 20px 0; padding:12px; background:linear-gradient(135deg,var(--rose),var(--lavender)); border:none; border-radius:14px; color:#fff; font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:600; cursor:pointer; width:calc(100% - 40px); transition:all 0.2s; }
    .sidebar-body { flex:1; overflow-y:auto; padding:16px 0; }
    .sidebar-section-label { font-size:0.62rem; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-soft); padding:0 20px 8px; }
    .chat-item { padding:12px 20px; cursor:pointer; transition:background 0.2s; display:flex; align-items:flex-start; gap:10px; }
    .chat-item:hover, .chat-item.active { background:var(--rose-soft); }
    .chat-item-pin { font-size:0.85rem; opacity:0.5; flex-shrink:0; margin-top:2px; }
    .chat-item-pin.pinned { opacity:1; }
    .chat-item-info { flex:1; min-width:0; }
    .chat-item-title { font-size:0.85rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-item-date { font-size:0.7rem; color:var(--text-soft); margin-top:2px; }
    .chat-item-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
    .chat-item:hover .chat-item-actions { opacity:1; }
    .chat-action-btn { background:none; border:none; cursor:pointer; font-size:0.85rem; padding:3px 5px; border-radius:6px; }
    .sidebar-empty { text-align:center; padding:32px 20px; color:var(--text-soft); font-size:0.82rem; }

    /* ── MAIN LAYOUT — key fix for mobile ── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header { display:flex; align-items:center; gap:10px; padding:16px 20px 10px; flex-shrink:0; animation:fadeDown 0.7s ease both; }
    .menu-btn, .back-btn { background:none; border:none; cursor:pointer; opacity:0.6; transition:opacity 0.2s; padding:4px 6px; border-radius:8px; font-size:1.2rem; }
    .back-btn { font-size:1.3rem; }
    .menu-btn:hover, .back-btn:hover { opacity:1; background:var(--rose-soft); }
    .header-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--rose),var(--lavender)); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    .header-info { flex:1; min-width:0; }
    .header-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; }
    .header-title span { color:var(--rose); font-style:italic; }
    .header-sub { font-size:0.66rem; color:var(--text-soft); display:flex; align-items:center; gap:5px; }
    .online-dot { width:6px; height:6px; border-radius:50%; background:var(--mint); box-shadow:0 0 5px var(--mint); animation:pulse 2.5s infinite; }
    .save-btn { background:none; border:1.5px solid rgba(242,168,184,0.4); border-radius:10px; cursor:pointer; font-size:0.72rem; color:var(--text-soft); padding:5px 10px; transition:all 0.2s; white-space:nowrap; }
    .save-btn:hover { border-color:var(--rose); color:var(--text); background:var(--rose-soft); }

    /* ── CHAT AREA — scrollable middle ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .chat-area::-webkit-scrollbar { width:4px; }
    .chat-area::-webkit-scrollbar-thumb { background:rgba(180,130,110,0.2); border-radius:4px; }

    .msg-wrapper { display:flex; flex-direction:column; animation:slideIn 0.3s ease both; }
    .msg-wrapper.user { align-items:flex-end; }
    .msg-wrapper.assistant { align-items:flex-start; }
    .msg-bubble { max-width:85%; padding:12px 16px; border-radius:18px; font-size:0.88rem; line-height:1.6; }
    .msg-wrapper.user .msg-bubble { background:linear-gradient(135deg,var(--rose),var(--lavender)); color:#fff; border-bottom-right-radius:4px; }
    .msg-wrapper.assistant .msg-bubble { background:rgba(255,255,255,0.82); backdrop-filter:blur(10px); color:var(--text); border-bottom-left-radius:4px; box-shadow:0 2px 10px var(--shadow); }
    .msg-time { font-size:0.65rem; color:var(--text-soft); margin-top:4px; padding:0 4px; }

    .typing-bubble { background:rgba(255,255,255,0.82); backdrop-filter:blur(10px); padding:12px 16px; border-radius:18px; border-bottom-left-radius:4px; box-shadow:0 2px 10px var(--shadow); display:inline-flex; gap:5px; align-items:center; }
    .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--lavender); animation:typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }

    .welcome-card { background:rgba(255,255,255,0.75); border-radius:20px; padding:18px; margin:8px 0; box-shadow:0 2px 12px var(--shadow); }
    .welcome-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; margin-bottom:6px; }
    .welcome-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .chip { padding:6px 12px; background:var(--lav-soft); border:1.5px solid rgba(201,184,232,0.4); border-radius:20px; font-size:0.76rem; color:var(--text); cursor:pointer; transition:all 0.2s; }
    .chip:hover { background:var(--lavender); color:#fff; }

    /* ── POPUP ── */
    .popup-overlay { position:fixed; inset:0; background:rgba(74,55,40,0.25); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .popup-overlay.hidden { display:none; }
    .popup-card { background:#fff; border-radius:28px 28px 0 0; padding:24px 24px 32px; width:100%; max-width:480px; box-shadow:0 -8px 40px var(--shadow); max-height:80dvh; overflow-y:auto; animation:slideUp 0.3s ease both; }
    .popup-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; margin-bottom:4px; }
    .popup-sub { font-size:0.78rem; color:var(--text-soft); margin-bottom:18px; }
    .popup-options { display:flex; flex-direction:column; gap:10px; }
    .popup-option { padding:13px 16px; border-radius:14px; border:1.5px solid rgba(242,168,184,0.3); background:rgba(255,255,255,0.8); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px; }
    .popup-option:hover { border-color:var(--rose); background:var(--rose-soft); transform:translateX(4px); }
    .popup-option-icon { font-size:1.3rem; flex-shrink:0; }
    .popup-option-label { font-size:0.9rem; font-weight:500; color:var(--text); }
    .popup-option-desc  { font-size:0.73rem; color:var(--text-soft); margin-top:2px; }
    .popup-cancel { width:100%; margin-top:12px; padding:11px; background:none; border:none; color:var(--text-soft); font-family:'DM Sans',sans-serif; font-size:0.82rem; cursor:pointer; border-radius:12px; transition:all 0.2s; }
    .popup-cancel:hover { background:var(--rose-soft); }

    /* ── INPUT — always visible above keyboard ── */
    .input-area {
      flex-shrink: 0;
      padding: 10px 20px env(safe-area-inset-bottom, 16px);
      background: var(--bg);
    }
    .input-row { display:flex; gap:10px; align-items:flex-end; background:rgba(255,255,255,0.88); backdrop-filter:blur(12px); border-radius:20px; padding:10px 10px 10px 16px; box-shadow:0 3px 18px var(--shadow); border:1.5px solid rgba(255,255,255,0.9); }
    textarea { flex:1; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--text); outline:none; resize:none; max-height:100px; line-height:1.5; }
    textarea::placeholder { color:var(--text-soft); }
    .send-btn { width:38px; height:38px; background:linear-gradient(135deg,var(--rose),var(--lavender)); border:none; border-radius:12px; color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
    .send-btn:hover { transform:scale(1.05); }
    .send-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .mic-send-btn { width:38px; height:38px; background:rgba(255,255,255,0.6); border:1.5px solid rgba(242,168,184,0.4); border-radius:12px; color:var(--text-soft); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
    .mic-send-btn:hover { border-color:var(--rose); background:var(--rose-soft); }
    .mic-send-btn.listening { background:linear-gradient(135deg,var(--rose),var(--lavender)); border-color:transparent; color:#fff; animation:micPulse 1.2s ease-in-out infinite; }
    .mic-send-btn.processing { background:linear-gradient(135deg,var(--peach),var(--mint)); border-color:transparent; color:#fff; }
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(242,168,184,0.4)} 50%{box-shadow:0 0 0 8px rgba(242,168,184,0)} }

    @keyframes fadeDown  { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn   { from{opacity:0;transform:translateY(10px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Chat<span>verlauf</span></div>
    <div class="sidebar-sub">Deine Gespräche mit JANnina</div>
  </div>
  <button class="sidebar-new-btn" onclick="newChat(); closeSidebar()">+ Neues Gespräch</button>
  <div class="sidebar-body" id="sidebar-body"><div class="sidebar-empty">Noch keine Chats</div></div>
</div>

<div class="popup-overlay hidden" id="popup-overlay">
  <div class="popup-card">
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-sub"   id="popup-sub"></div>
    <div class="popup-options" id="popup-options"></div>
    <button class="popup-cancel" onclick="closePopup()">Lieber selbst antworten</button>
  </div>
</div>

<div id="app">
  <header>
    <button class="back-btn" onclick="window.location.href='app.html'">←</button>
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="header-avatar">👩‍🦰</div>
    <div class="header-info">
      <div class="header-title">JAN<span>nina</span></div>
      <div class="header-sub"><div class="online-dot"></div> Immer da ✨</div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveCurrentChat()">💾</button>
  </header>

  <div class="chat-area" id="chat-area"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Schreib JANnina..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="mic-send-btn" id="mic-btn" onclick="toggleMic()" title="Mit JANnina sprechen">🎤</button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Publishable Key — sicher für Frontend. Alle anderen Keys NIEMALS hier!
  const { createClient } = supabase;
  const sb = createClient(
    'https://ygwfolclbfkhxdkavmak.supabase.co',     // Zeile 98
    'sb_publishable_9uJwdWUO8o6NEUOdud0ezA_F56WM0cK'    // Zeile 99
  );

  const FUNCTION_URL = 'https://ygwfolclbfkhxdkavmak.supabase.co/functions/v1/jannina';
  let messages = [], currentChatId = null, userId = null, allChats = [];
  let wetterKontext = null;

  // ── WETTER ────────────────────────────────────────────────
  const wDescs = {0:'Klarer Himmel',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bedeckt',45:'Neblig',48:'Neblig',51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Leichter Schnee',73:'Schnee',75:'Starker Schnee',80:'Regenschauer',81:'Starke Schauer',82:'Gewitter',95:'Gewitter'};

  async function ladeWetter() {
    try {
      let lat = 53.0793, lon = 8.8017, stadt = 'Bremen';
      // Geolocation versuchen
      try {
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 4000 }));
        lat = pos.coords.latitude; lon = pos.coords.longitude;
        const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=de`);
        const geoData = await geo.json();
        stadt = geoData.address?.city || geoData.address?.town || geoData.address?.village || 'deinem Ort';
      } catch(_) { /* Fallback Bremen */ }

      const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&hourly=temperature_2m,weathercode&timezone=Europe/Berlin&forecast_days=1`);
      const data = await res.json();
      const temp = Math.round(data.current.temperature_2m);
      const code = data.current.weathercode;
      const desc = wDescs[code] || 'Wechselhaft';

      // Nächste 6 Stunden
      const jetzt = new Date();
      const slots = [];
      for (let i = 0; i < data.hourly.time.length && slots.length < 6; i++) {
        if (new Date(data.hourly.time[i]) > jetzt) {
          const h = new Date(data.hourly.time[i]).getHours();
          slots.push(`${String(h).padStart(2,'0')}:00 Uhr ${Math.round(data.hourly.temperature_2m[i])}°C (${wDescs[data.hourly.weathercode[i]]||'?'})`);
        }
      }

      wetterKontext = `Aktuelles Wetter in ${stadt}: ${temp}°C, ${desc}. Stundenvorhersage: ${slots.join(' → ')}`;
    } catch(_) {
      wetterKontext = null;
    }
  }

  // Wetter im Hintergrund laden
  ladeWetter();

  // ── AUTH ──────────────────────────────────────────────────
  (async () => {
    try {
      const { data } = await sb.auth.getSession();
      if (!data.session) return window.location.href = 'index.html';
      userId = data.session.user.id;
    } catch(e) { return window.location.href = 'index.html'; }
    await loadChats();
    showWelcome();

    // Frage vom Dashboard aufgreifen
    const frage = localStorage.getItem('janvis_jannina_frage');
    if (frage) {
      localStorage.removeItem('janvis_jannina_frage');
      setTimeout(() => sendMessage(frage), 600);
    }
  })();

  // ── SIDEBAR ───────────────────────────────────────────────
  function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

  async function loadChats() {
    const { data } = await sb.from('jannina_chats').select('*').eq('user_id', userId)
      .order('gepinnt', { ascending:false }).order('created_at', { ascending:false }).limit(20);
    allChats = data || [];
    renderSidebar();
  }

  function renderSidebar() {
    const body   = document.getElementById('sidebar-body');
    const pinned = allChats.filter(c => c.gepinnt);
    const rest   = allChats.filter(c => !c.gepinnt).slice(0,5);
    if (!allChats.length) { body.innerHTML = '<div class="sidebar-empty">Noch keine Chats 🌸</div>'; return; }
    let html = '';
    if (pinned.length) { html += `<div class="sidebar-section-label">📌 Angeheftet</div>`; pinned.forEach(c => html += chatItemHtml(c)); }
    if (rest.length)   { html += `<div class="sidebar-section-label" style="margin-top:${pinned.length?'12px':'0'}">Letzte Chats</div>`; rest.forEach(c => html += chatItemHtml(c)); }
    body.innerHTML = html;
  }

  function chatItemHtml(c) {
    const date = new Date(c.created_at).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    return `<div class="chat-item ${c.id===currentChatId?'active':''}" onclick="loadChat('${c.id}')">
      <div class="chat-item-pin ${c.gepinnt?'pinned':''}">📌</div>
      <div class="chat-item-info"><div class="chat-item-title">${escapeHtml(c.titel||'Gespräch')}</div><div class="chat-item-date">${date}</div></div>
      <div class="chat-item-actions">
        <button class="chat-action-btn" onclick="event.stopPropagation();togglePin('${c.id}',${c.gepinnt})">${c.gepinnt?'📌':'📍'}</button>
        <button class="chat-action-btn" onclick="event.stopPropagation();deleteChat('${c.id}')">🗑️</button>
      </div>
    </div>`;
  }

  async function loadChat(id) {
    const chat = allChats.find(c => c.id === id);
    if (!chat) return;
    currentChatId = id; messages = chat.messages || [];
    document.getElementById('chat-area').innerHTML = '';
    messages.forEach(m => appendMessage(m.role, m.content, false));
    scrollToBottom(); closeSidebar(); renderSidebar();
  }

  async function saveCurrentChat() {
    if (!messages.length) return;
    const firstUser = messages.find(m => m.role === 'user');
    const titel = firstUser ? firstUser.content.substring(0,40)+(firstUser.content.length>40?'...':'') : 'Gespräch';
    if (currentChatId) {
      await sb.from('jannina_chats').update({ messages, titel }).eq('id', currentChatId).eq('user_id', userId);
    } else {
      const { data } = await sb.from('jannina_chats').insert({ titel, messages, user_id:userId, gepinnt:false }).select().single();
      if (data) currentChatId = data.id;
    }
    await loadChats();
    const btn = document.getElementById('save-btn');
    btn.textContent = '✅'; setTimeout(() => btn.textContent = '💾', 1500);
  }

  async function togglePin(id, current) {
    await sb.from('jannina_chats').update({ gepinnt:!current }).eq('id',id).eq('user_id',userId);
    await loadChats();
  }
  async function deleteChat(id) {
    await sb.from('jannina_chats').delete().eq('id',id).eq('user_id',userId);
    if (currentChatId === id) { currentChatId = null; newChat(); }
    await loadChats();
  }

  function newChat() {
    currentChatId = null; messages = [];
    document.getElementById('chat-area').innerHTML = '';
    showWelcome();
  }

  function showWelcome() {
    const area = document.getElementById('chat-area');
    const div  = document.createElement('div');
    div.className = 'msg-wrapper assistant';
    div.innerHTML = `<div class="welcome-card">
      <div class="welcome-title">Na, da bist du ja! 🥰</div>
      <div style="font-size:0.83rem;color:var(--text-soft);line-height:1.6">Ich hab grad Kuchen gegessen und war beim Yoga — also bin ich in absoluter Bestlaune. Was liegt an?</div>
      <div class="welcome-chips">
        <div class="chip" onclick="sendMessage('Wie wird das Wetter heute?')">🌤️ Wetter</div>
        <div class="chip" onclick="sendMessage('Was sind meine nächsten Termine?')">📅 Termine</div>
        <div class="chip" onclick="sendMessage('Was steht auf meiner Einkaufsliste?')">🛒 Liste anzeigen</div>
        <div class="chip" onclick="sendMessage('Was kann ich heute kochen?')">🍳 Rezepte</div>
      </div>
    </div>`;
    area.appendChild(div);
  }

  // ── POPUP ─────────────────────────────────────────────────
  function showPopup(popup) {
    if (!popup?.optionen?.length) return;
    document.getElementById('popup-title').textContent = popup.titel || '';
    document.getElementById('popup-sub').textContent   = popup.sub   || '';
    const container = document.getElementById('popup-options');
    container.innerHTML = '';
    popup.optionen.forEach(opt => {
      const div = document.createElement('div');
      div.className = 'popup-option';
      div.innerHTML = `<div class="popup-option-icon">${opt.icon||'💬'}</div>
        <div><div class="popup-option-label">${escapeHtml(opt.label||'')}</div>
        <div class="popup-option-desc">${escapeHtml(opt.desc||'')}</div></div>`;
      div.onclick = () => { closePopup(); sendMessage(opt.wert); };
      container.appendChild(div);
    });
    document.getElementById('popup-overlay').classList.remove('hidden');
  }
  function closePopup() { document.getElementById('popup-overlay').classList.add('hidden'); }

  // ── SEND ──────────────────────────────────────────────────
  async function sendMessage(text) {
    const input = document.getElementById('msg-input');
    const value = (text || input.value).trim();
    if (!value) return;
    input.value = ''; autoResize(input);
    appendMessage('user', value);
    messages.push({ role:'user', content:value });
    const typingId = showTyping();
    document.getElementById('send-btn').disabled = true;
    try {
      const { data:{ session } } = await sb.auth.getSession();
      const googleToken = localStorage.getItem('janvis_google_token') || null;
      const res  = await fetch(FUNCTION_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
        body: JSON.stringify({ messages, userId, googleToken, wetterKontext })
      });
      const data = await res.json();
      removeTyping(typingId);
      if (data.reply) {
        appendMessage('assistant', data.reply);
        messages.push({ role:'assistant', content:data.reply });
        if (messages.length > 30) messages = messages.slice(-30);
        if (data.popup) showPopup(data.popup);
      } else {
        appendMessage('assistant', 'Hmm, da ist was schiefgelaufen 🌸');
      }
    } catch(e) {
      removeTyping(typingId);
      appendMessage('assistant', 'Ich bin kurz offline 🌸');
    }
    document.getElementById('send-btn').disabled = false;
    resetMic();
    scrollToBottom();
  }

  function appendMessage(role, text, scroll=true) {
    const area = document.getElementById('chat-area');
    const now  = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    const div  = document.createElement('div');
    div.className = `msg-wrapper ${role}`;
    div.innerHTML = `<div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div><div class="msg-time">${now}</div>`;
    area.appendChild(div);
    if (scroll) scrollToBottom();
  }
  function showTyping() {
    const area = document.getElementById('chat-area');
    const id   = 'typing-'+Date.now();
    const div  = document.createElement('div');
    div.className='msg-wrapper assistant'; div.id=id;
    div.innerHTML=`<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    area.appendChild(div); scrollToBottom(); return id;
  }
  function removeTyping(id) { document.getElementById(id)?.remove(); }
  function scrollToBottom() { const a=document.getElementById('chat-area'); a.scrollTop=a.scrollHeight; }
  // ── VOICE (Siri-Style) ────────────────────────────────────
  let recognition = null;
  let listening   = false;

  function toggleMic() {
    if (listening) { recognition?.stop(); return; }
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      showToast('Spracheingabe nicht unterstützt 😔'); return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'de-DE';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      listening = true;
      const btn = document.getElementById('mic-btn');
      btn.classList.add('listening');
      btn.textContent = '🎙️';
    };

    recognition.onresult = async (e) => {
      const text = e.results[0][0].transcript;
      const btn = document.getElementById('mic-btn');
      btn.classList.remove('listening');
      btn.classList.add('processing');
      btn.textContent = '⏳';
      // Direkt an JANnina senden — wie Siri
      await sendMessage(text);
    };

    recognition.onerror = () => {
      resetMic();
      showToast('Sprache nicht erkannt — nochmal versuchen 🎤');
    };

    recognition.onend = () => { resetMic(); };
    recognition.start();
  }

  function resetMic() {
    listening = false;
    const btn = document.getElementById('mic-btn');
    btn.classList.remove('listening', 'processing');
    btn.textContent = '🎤';
  }

  function showToast(text) {
    // Kleiner Toast falls noch nicht vorhanden
    let toast = document.getElementById('voice-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'voice-toast';
      toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(74,55,40,0.9);color:#fff;padding:10px 18px;border-radius:14px;font-size:0.82rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;';
      document.body.appendChild(toast);
    }
    toast.textContent = text;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 3000);
  }

  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
  function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
